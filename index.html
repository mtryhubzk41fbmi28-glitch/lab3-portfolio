<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Портфоліо | Максим</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body data-page="index">
    <header class="hero">
        <div class="container">
            <img src="my-photo.png" alt="Максим" style="width:150px; border-radius:50%;">
            <h1 data-i18n="heroTitle">Максим</h1>
            <p data-i18n="heroText"></p>
            <div class="hero__actions">
                <a href="#projects" data-i18n="projectsLink" class="btn">Проєкти</a>
                <a href="contacts.html" data-i18n="navContacts" class="btn">Контакти</a>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <div class="container nav-row">
            <button id="langUk">UA</button>
            <button id="langEn">EN</button>
            <button id="themeToggle" data-i18n="themeButton">Тема</button>
        </div>
    </nav>

    <main class="container">
        <section id="projects">
            <h2 data-i18n="projectsTitle">Проєкти</h2>
            <div class="controls">
                <span data-i18n="shownLabel"></span> <span id="resultCount">0</span>
                <div id="tagList" class="tag-list"></div>
            </div>
            <div id="projectGrid" class="project-grid"></div>
        </section>
    </main>

    <div id="projectModal" class="modal">
        <div id="modalOverlay" class="modal__overlay"></div>
        <div class="modal__content">
            <button id="modalClose">×</button>
            <h3 id="modalTitle"></h3>
            <p id="modalDetails"></p>
            <a id="modalRepo" href="#" target="_blank" data-i18n="repoLink">GitHub</a>
        </div>
    </div>
    <button id="backToTop" class="back-to-top">↑</button>
</body>
</html>
